name: Build NORS OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap squashfs-tools dos2unix

    - name: Fix Line Endings and Permissions
      run: |
        find . -type f -name "*.sh" -exec dos2unix {} +
        chmod +x build_iso.sh
        
    - name: Run ISO Builder
      run: |
        sudo bash ./build_iso.sh

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v3
      with:
        name: NORS_OS_ISO
        path: nors-build/nors-os-beta-amd64.iso
